<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Evento Elegante</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Painel de Convidados</h1>
            <p>Evento Exclusivo</p>
        </header>

        <nav class="grid-menu">
            <button onclick="gerenciador.listarTodos()">1. Lista Geral</button>
            <button onclick="gerenciador.filtrarLetraA()">2. Nomes com 'A'</button>
            <button onclick="gerenciador.filtrarMaisDe5()">3. +5 Letras</button>
            <button onclick="gerenciador.exibirFormulario()">4. Adicionar</button>
            <button onclick="gerenciador.verConfirmados()">5. Confirmados</button>
            <button onclick="gerenciador.exibirPesquisa()">6. Pesquisar</button>
            <button onclick="gerenciador.exibirFiltros()">7. Ordenação</button>
            <button onclick="gerenciador.infoEvento()">8. Informações</button>
            <button onclick="gerenciador.maiusculas()">9. MAIÚSCULAS</button>
        </nav>

        <main id="app-content">
            <div id="controles"></div>
            <div id="lista-exibicao">
                <p class="placeholder">Selecione uma opção no menu acima.</p>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
