<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Convidados</title>
    <style>
        /* Estilos gerais */
        body {
            background-color: #D7B49E; /* Tom de marrom claro */
            font-family: 'Arial', sans-serif;
            color: #4E3629; /* Cor de texto marrom escuro */
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #9E7A4B; /* Marrom dourado suave */
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Estilo dos botões */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            background-color: #C79A6B; /* Marrom suave */
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.3s;
            width: 250px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: #D69A43; /* Marrom mais vibrante */
            transform: scale(1.05); /* Efeito de aumento ao passar o mouse */
        }

        button:active {
            transform: scale(1); /* Retorna ao tamanho original ao clicar */
        }

        /* Tabela de convidados */
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            text-align: center;
        }

        table th, table td {
            padding: 12px;
            border: 1px solid #fff;
        }

        table th {
            background-color: #C79A6B;
            font-size: 1.2em;
        }

        table tr:nth-child(even) {
            background-color: #E7C9A9; /* Cor de fundo mais clara */
        }

        table tr:hover {
            background-color: #D69A43; /* Cor mais vibrante ao passar o mouse */
        }

        /* Formulário de Adição de Convidado */
        .form-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }

        input {
            padding: 12px;
            font-size: 16px;
            margin: 10px;
            border-radius: 5px;
            border: 2px solid #D69A43; /* Cor de borda */
            background-color: #fff;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .add-btn {
            background-color: #9E7A4B; /* Marrom dourado */
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            padding: 12px 20px;
            transition: background-color 0.3s, transform 0.2s;
        }

        .add-btn:hover {
            background-color: #D69A43; /* Cor de fundo mais vibrante */
            transform: scale(1.05);
        }

        .add-btn:active {
            transform: scale(1);
        }

        /* Título da tabela */
        .table-title {
            font-size: 1.5em;
            color: #9E7A4B;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Gerenciador de Convidados</h1>
    
    <!-- Botões para filtros -->
    <div class="button-container">
        <button onclick="showConvidados()">Mostrar Todos os Convidados</button>
        <button onclick="showNomesA()">Nomes que começam com A</button>
        <button onclick="showNomesMaiorQueCinco()">Nomes com mais de 5 letras</button>
        <button onclick="filtroOrdemAlfabetica()">Ordem Alfabética</button>
        <button onclick="nomesMaiusculos()">Nomes em Maiúsculo</button>
    </div>

    <!-- Formulário de Adição de Convidado -->
    <div class="form-container">
        <input type="text" id="novoConvidado" placeholder="Digite o nome do convidado">
        <button class="add-btn" onclick="adicionarConvidado()">Adicionar Convidado</button>
    </div>

    <!-- Tabela de Convidados -->
    <div class="table-title">Lista de Convidados</div>
    <table id="convidadosTable" style="display: none;">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        // Lista inicial de convidados
        let convidados = [
            "Ana", "Lucas", "Beatriz", "Carlos", "Amanda", "Rafael", "Juliana", "Gabriel", "Paula", "Eduardo"
        ];

        // Função para mostrar todos os convidados
        function showConvidados() {
            const tableBody = document.querySelector('#convidadosTable tbody');
            tableBody.innerHTML = ''; // Limpa a tabela antes de preenchê-la

            convidados.forEach((convidado, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${index + 1}</td><td>${convidado}</td>`;
                tableBody.appendChild(row);
            });

            document.getElementById('convidadosTable').style.display = 'table';
        }

        // Função para mostrar nomes que começam com "A"
        function showNomesA() {
            const nomesA = convidados.filter(nome => nome.startsWith('A'));
            mostrarTabelaFiltrada(nomesA);
        }

        // Função para mostrar nomes com mais de 5 letras
        function showNomesMaiorQueCinco() {
            const nomesMaiorQueCinco = convidados.filter(nome => nome.length > 5);
            mostrarTabelaFiltrada(nomesMaiorQueCinco);
        }

        // Função para ordenar os convidados em ordem alfabética
        function filtroOrdemAlfabetica() {
            const ordemAlfabetica = [...convidados].sort();
            mostrarTabelaFiltrada(ordemAlfabetica);
        }

        // Função para mostrar convidados em maiúsculas
        function nomesMaiusculos() {
            const nomesMaiusculos = convidados.map(nome => nome.toUpperCase());
            mostrarTabelaFiltrada(nomesMaiusculos);
        }

        // Função para mostrar uma lista filtrada na tabela
        function mostrarTabelaFiltrada(lista) {
            const tableBody = document.querySelector('#convidadosTable tbody');
            tableBody.innerHTML = ''; // Limpa a tabela antes de preenchê-la

            lista.forEach((convidado, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${index + 1}</td><td>${convidado}</td>`;
                tableBody.appendChild(row);
            });

            document.getElementById('convidadosTable').style.display = 'table';
        }

        // Função para adicionar um novo convidado
        function adicionarConvidado() {
            const nome = document.getElementById('novoConvidado').value.trim();

            if (nome) {
                convidados.push(nome);
                alert("Convidado adicionado: " + nome);
                document.getElementById('novoConvidado').value = ''; // Limpa o campo de input
                showConvidados(); // Atualiza a lista de convidados
            } else {
                alert("Por favor, insira um nome válido.");
            }
        }
    </script>

</body>
</html>
