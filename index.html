<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados - Tema Vaca</title>

    <!-- Link para o CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="header">
        <img src="https://www.pngitem.com/pimgs/m/84-847125_vaca-vaca-vaca-cartoon-png-transparent-png.png" alt="Vaca" class="vaca-icone">
        <h1>Evento do Boi — Lista de Convidados</h1>
    </div>

    <!-- Botões principais -->
    <button class="button" onclick="showList('all')">Todos os Convidados</button>
    <button class="button" onclick="showList('a')">Começam com "A"</button>
    <button class="button" onclick="showList('long')">Mais de 5 Letras</button>

    <!-- Botões de ação -->
    <button class="button" onclick="toggleAddForm()">Adicionar Convidado</button>
    <button class="button" onclick="toggleSearchForm()">Pesquisar Convidado</button>

    <!-- Formulário adicionar -->
    <div id="addForm" class="form-container" style="display:none;">
        <input type="text" id="newGuestName" placeholder="Nome do novo convidado">
        <button class="button" onclick="addGuest()">Adicionar</button>
        <button class="button" onclick="toggleAddForm()">Cancelar</button>
    </div>

    <!-- Formulário pesquisar -->
    <div id="searchForm" class="form-container" style="display:none;">
        <input type="text" id="searchGuestName" placeholder="Pesquisar por nome">
        <button class="button" onclick="searchGuest()">Pesquisar</button>
        <button class="button" onclick="toggleSearchForm()">Cancelar</button>
    </div>

    <div class="cow-decor">
        <img src="https://www.kindpng.com/picc/m/76-763509_cow-pattern-png-transparent-png.png" class="cow-pattern">
    </div>

    <!-- Aqui a lista será exibida -->
    <div id="listContainer" class="list-container"></div>

    <!-- Link para JavaScript -->
    <script src="script.js"></script>

</body>
</html>
