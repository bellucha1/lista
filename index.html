<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Tela inicial decorada em marrom -->
    <div class="header">
        <h1>Bem-vindo ao Evento!</h1>
    </div>

    <div class="buttons-container">
        <!-- Botões -->
        <button class="button" onclick="showList('all')">Lista de Convidados</button>
        <button class="button" onclick="showList('a')">Nomes Começando com "A"</button>
        <button class="button" onclick="showList('long')">Nomes com Mais de 5 Letras</button>
        <button class="button" onclick="toggleAddForm()">Adicionar Convidado</button>
        <button class="button" onclick="showConfirmation()">Visualizar Confirmação</button>
        <button class="button" onclick="toggleSearchForm()">Pesquisar Convidado</button>
        <button class="button" onclick="toggleSortOptions()">Filtrar por Ordem</button>
        <button class="button" onclick="showEventInfo()">Informações sobre o Evento</button>
        <button class="button" onclick="showUppercase()">Exibir em Maiúsculas</button>
    </div>

    <!-- Formulário de Adicionar Convidado -->
    <div id="addForm" class="form-container" style="display:none;">
        <input type="text" id="newGuestName" placeholder="Nome do Novo Convidado">
        <button class="button" onclick="addGuest()">Adicionar</button>
        <button class="button" onclick="toggleAddForm()">Cancelar</button>
    </div>

    <!-- Formulário de Pesquisa -->
    <div id="searchForm" class="form-container" style="display:none;">
        <input type="text" id="searchGuestName" placeholder="Pesquisar por nome">
        <button class="button" onclick="searchGuest()">Pesquisar</button>
        <button class="button" onclick="toggleSearchForm()">Cancelar</button>
    </div>

    <!-- Formulário de Ordenação -->
    <div id="sortForm" class="form-container" style="display:none;">
        <select id="sortOption">
            <option value="alphabetical">Ordem Alfabética</option>
            <option value="confirmed">Confirmados primeiro</option>
            <option value="longest">Maior quantidade de letras</option>
        </select>
        <button class="button" onclick="sortList()">Ordenar</button>
        <button class="button" onclick="toggleSortOptions()">Cancelar</button>
    </div>

    <!-- Container para exibir as listas -->
    <div id="listContainer" class="list-container"></div>

    <!-- Exibindo Informações sobre o Evento -->
    <div id="eventInfo" class="info-container" style="display:none;">
        <h2>Informações do Evento</h2>
        <p>Data: 15/12/2023</p>
        <p>Local: Sala de Eventos XYZ</p>
        <p>Horário: 19h00</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
